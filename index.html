<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Sound — the world codes, we narrate</title>
  <style>
    :root {
      --bg:      #f7f7f7;
      --surface: #ffffff;
      --border:  #e2e2e2;
      --text:    #111111;
      --muted:   #999999;
      --radius:  5px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .logo {
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: -.01em;
      color: var(--text);
      white-space: nowrap;
    }

    /* ── Wave ── */
    .wave { display: flex; align-items: center; gap: 2px; height: 14px; }
    .wave span {
      display: block; width: 2px; height: 2px;
      background: var(--muted); border-radius: 1px;
    }
    .wave.active span { animation: waveup .85s ease-in-out infinite; }
    .wave span:nth-child(1){animation-delay:.00s}
    .wave span:nth-child(2){animation-delay:.13s}
    .wave span:nth-child(3){animation-delay:.26s}
    .wave span:nth-child(4){animation-delay:.19s}
    .wave span:nth-child(5){animation-delay:.06s}
    @keyframes waveup { 0%,100%{height:2px} 50%{height:12px} }

    /* ── Controls ── */
    .controls { display:flex; align-items:center; gap:6px; margin-left:auto; flex-wrap:wrap; }
    .token-wrap { display:flex; align-items:center; gap:5px; }
    .token-wrap label { font-size:.72rem; color:var(--muted); white-space:nowrap; }

    input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: var(--radius);
      font-size: .75rem;
      font-family: inherit;
      width: 160px;
    }
    input:focus { outline: none; border-color: var(--text); }

    button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .75rem;
      font-family: inherit;
      font-weight: 500;
      white-space: nowrap;
      transition: background .1s;
    }
    button:hover { background: var(--bg); }
    button.on    { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* ── Status strip ── */
    .statusbar {
      border-bottom: 1px solid var(--border);
      padding: 4px 16px;
      font-size: .68rem;
      color: var(--muted);
      display: flex; gap: 14px; align-items: center; flex-shrink: 0; flex-wrap: wrap;
    }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; margin-right: 4px; vertical-align: middle;
    }

    /* ── Karaoke stage ── */
    .stage {
      background: #111;
      border-bottom: 1px solid #000;
      padding: 16px 20px;
      flex-shrink: 0;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .stage-label {
      font-size: .58rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,.25);
    }

    .karaoke-text {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      color: rgba(255,255,255,.4);
      max-width: 90vw;
      word-break: break-word;
    }

    .kw { display: inline-block; transition: color .08s; }
    .kw.lit  { color: #ffffff; }
    .kw.said { color: rgba(255,255,255,.6); }

    .idle-msg {
      color: rgba(255,255,255,.2);
      font-size: .9rem;
      font-style: italic;
    }

    /* ── Event feed ── */
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 50px 20px;
      font-size: .88rem;
      line-height: 1.8;
    }
    .empty-state h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }

    /* ── Event card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      display: flex;
      gap: 9px;
    }
    .card.speaking { border-color: var(--text); }

    .card-left {
      display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--border); object-fit: cover;
    }

    .badge {
      font-size: .57rem; padding: 1px 4px; border-radius: 3px;
      font-weight: 500; white-space: nowrap;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
    }

    .card-body  { flex: 1; min-width: 0; }
    .card-meta  { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
    .actor      { font-weight: 600; font-size: .77rem; color: var(--text); }
    .repo       { font-size: .69rem; color: var(--muted); }
    .ts         { font-size: .66rem; color: var(--muted); margin-left: auto; }
    .card-text  { font-size: .77rem; color: var(--text); line-height: 1.4; word-break: break-word; }
    .card-text.dim { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">GitHub Sound</div>

  <div class="wave" id="wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="controls">
    <div class="token-wrap">
      <label for="tokenInput">Token</label>
      <input type="password" id="tokenInput"
             placeholder="ghp_... (optional)"
             title="GitHub token — more requests per hour">
      <button onclick="saveToken()">Save</button>
    </div>
    <button id="muteBtn"  onclick="toggleMute()">Mute</button>
    <button id="pauseBtn" onclick="togglePause()">Pause</button>
    <button onclick="clearFeed()">Clear</button>
  </div>
</header>

<!-- ── Status strip ── -->
<div class="statusbar">
  <span><span class="dot" id="dot"></span><span id="statusTxt">Starting…</span></span>
  <span>Events: <strong id="evtCount">0</strong></span>
  <span>Words: <strong id="wrdCount">0</strong></span>
  <span>Queue: <strong id="qCount">0</strong></span>
  <span>Rate: <strong id="rateLimit">—</strong></span>
  <span>Next: <strong id="nextPoll">—</strong></span>
</div>

<!-- ── Karaoke stage ── -->
<div class="stage">
  <div class="stage-label">now speaking</div>
  <div class="karaoke-text" id="karaokeText">
    <span class="idle-msg">waiting…</span>
  </div>
</div>

<!-- ── Event feed ── -->
<div class="feed" id="feed">
  <div class="empty-state" id="empty">
    <h2>Listening to GitHub</h2>
    <p>
      Fetching public events from developers around the world.<br>
      Commit messages, pull requests, and issue reports<br>
      will be read aloud as they arrive.
    </p>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
let muted     = false;
let paused    = false;
let speaking  = false;
let pollMs    = 10_000;
let lastEtag  = null;
let seenIds   = new Set();
let queue     = [];
let evtTotal  = 0;
let wrdTotal  = 0;
let pollTimer = null;
let cdTimer   = null;
let pollsec   = 30;
let activeSpeakCard = null;

// ── Token ──────────────────────────────────────────────────────────────────
const getToken  = () => localStorage.getItem('gh_token') || '';
function saveToken() {
  const v = document.getElementById('tokenInput').value.trim();
  v ? localStorage.setItem('gh_token', v) : localStorage.removeItem('gh_token');
  restart();
}
(function loadToken() {
  const t = getToken();
  if (t) document.getElementById('tokenInput').value = t;
})();

// ── Controls ───────────────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  const b = document.getElementById('muteBtn');
  b.textContent = muted ? 'Unmute' : 'Mute';
  b.classList.toggle('on', muted);
  if (muted) { window.speechSynthesis.cancel(); speaking = false; waveOff(); showIdle(); }
  else        processQueue();
}

function togglePause() {
  paused = !paused;
  const b = document.getElementById('pauseBtn');
  b.textContent = paused ? 'Resume' : 'Pause';
  b.classList.toggle('on', paused);
  if (paused) {
    clearTimeout(pollTimer); clearInterval(cdTimer);
    document.getElementById('nextPoll').textContent = 'paused';
    setStatus('Paused');
  } else {
    restart();
  }
}

function clearFeed() {
  document.getElementById('feed').innerHTML =
    '<div class="empty-state"><h2>Feed cleared</h2><p>Fetching new events…</p></div>';
  seenIds.clear();
}

// ── Status ─────────────────────────────────────────────────────────────────
function setStatus(msg, err = false) {
  document.getElementById('statusTxt').textContent = msg;
  document.getElementById('dot').style.background  = err ? '#ef4444' : '#22c55e';
}
function refreshCounters() {
  document.getElementById('evtCount').textContent = evtTotal;
  document.getElementById('wrdCount').textContent = wrdTotal.toLocaleString();
  document.getElementById('qCount').textContent   = queue.length;
}

// ── Wave ───────────────────────────────────────────────────────────────────
const waveOn  = () => document.getElementById('wave').classList.add('active');
const waveOff = () => document.getElementById('wave').classList.remove('active');

// ── Text cleaning ──────────────────────────────────────────────────────────
function clean(text) {
  if (!text) return '';
  return text
    .replace(/```[\s\S]*?```/g,   ' (code block) ')
    .replace(/`[^`]+`/g,          ' code ')
    .replace(/!\[.*?\]\(.*?\)/g,  ' (image) ')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/#{1,6}\s*/g,        '')
    .replace(/[*_~]{1,3}([^*_~]+)[*_~]{1,3}/g, '$1')
    .replace(/^[-*+]\s+/gm,       '')
    .replace(/^\d+\.\s+/gm,       '')
    .replace(/>\s*/g,             '')
    .replace(/\n+/g,              ' ')
    .replace(/\s{2,}/g,           ' ')
    .trim();
}

function words(text, max = 40) {
  const w = text.split(/\s+/).filter(Boolean);
  return w.length <= max ? text : w.slice(0, max).join(' ') + '…';
}

const isBot = (login) => !login ||
  login.endsWith('[bot]') || login.includes('dependabot') ||
  login.includes('renovate') || login.endsWith('-bot');

const PR_INTROS = ['opened a PR:', 'proposed:', 'submitted:'];
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

// ── Event parsing ──────────────────────────────────────────────────────────
function parseEvent(ev) {
  if (ev.type !== 'PullRequestEvent') return null;
  if (ev.payload?.action !== 'opened')  return null;
  if (isBot(ev.actor?.login))           return null;

  const actor = ev.actor?.display_login || ev.actor?.login || 'someone';
  const repo  = ev.repo?.name || '';
  const pr    = ev.payload?.pull_request || {};
  const title = clean(pr.title || '');
  const body  = words(clean(pr.body  || ''), 25);
  const texts = [];

  if (title) texts.push({ speech: `${actor} ${pick(PR_INTROS)} ${title}`, display: title });
  if (body)  texts.push({ speech: body, display: body });

  if (texts.length === 0) return null;
  return { actor, repo, type: 'PullRequestEvent', badge: 'pr',
           summary: `opened PR: ${title}`, texts, time: ev.created_at };
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function reltime(iso) {
  const mins = Math.floor((Date.now() - new Date(iso)) / 60_000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins / 60)}h ago`;
}

// ── Add event card ─────────────────────────────────────────────────────────
function addCard(parsed, ev) {
  const feed = document.getElementById('feed');
  document.getElementById('empty')?.remove();

  const login    = ev.actor?.login ?? '';
  const avatar   = `https://avatars.githubusercontent.com/${encodeURIComponent(login)}?size=64`;
  const fallback = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26"><rect width="26" height="26" rx="13" fill="%23e2e2e2"/><text x="13" y="18" text-anchor="middle" font-size="12" fill="%23999">${encodeURIComponent((parsed.actor[0]||'?').toUpperCase())}</text></svg>`;
  const label    = 'PR';

  const displayText = parsed.texts.length
    ? parsed.texts.map(t => escHtml(t.display)).join(' · ')
    : `<span class="dim">${escHtml(parsed.summary)}</span>`;

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = ev.id;
  card.innerHTML = `
    <div class="card-left">
      <img class="avatar" src="${avatar}" alt="${escHtml(parsed.actor)}"
           onerror="this.src='${fallback}'">
      <span class="badge">${escHtml(label)}</span>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="actor">${escHtml(parsed.actor)}</span>
        <span class="repo">${escHtml(parsed.repo)}</span>
        <span class="ts">${reltime(parsed.time)}</span>
      </div>
      <div class="card-text">${displayText}</div>
    </div>`;

  feed.insertBefore(card, feed.firstChild);
  while (feed.children.length > 120) feed.removeChild(feed.lastChild);
  return card;
}

// ── Karaoke display ─────────────────────────────────────────────────────────
function showIdle() {
  document.getElementById('karaokeText').innerHTML =
    '<span class="idle-msg">waiting…</span>';
}

function buildKaraokeHTML(text) {
  const tokens = text.split(/(\s+)/);
  let html = '';
  let pos  = 0;
  for (const tok of tokens) {
    if (/\S/.test(tok)) {
      html += `<span class="kw" data-start="${pos}">${escHtml(tok)}</span>`;
    } else {
      html += escHtml(tok);
    }
    pos += tok.length;
  }
  return html;
}

function highlightKaraokeWord(charIndex) {
  const container = document.getElementById('karaokeText');
  const spans = container.querySelectorAll('.kw');
  let best = null;
  for (const s of spans) {
    const start = parseInt(s.dataset.start, 10);
    if (start <= charIndex) best = s;
    else break;
  }
  spans.forEach(s => {
    if (s === best) {
      s.classList.add('lit');
      s.classList.remove('said');
    } else if (parseInt(s.dataset.start, 10) < (best ? parseInt(best.dataset.start,10) : 0)) {
      s.classList.remove('lit');
      s.classList.add('said');
    } else {
      s.classList.remove('lit','said');
    }
  });
}

// ── Speech synthesis ─────────────────────────────────────────────────────────
function enqueue(text, card) {
  if (!text || text.trim().length < 4) return;
  queue.push({ text: text.trim(), card });
  refreshCounters();
  if (!speaking) processQueue();
}

function processQueue() {
  if (muted || speaking || queue.length === 0) return;

  const { text, card } = queue.shift();
  refreshCounters();

  speaking = true;
  waveOn();

  if (activeSpeakCard) activeSpeakCard.classList.remove('speaking');
  activeSpeakCard = card;
  if (card) {
    card.classList.add('speaking');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.getElementById('karaokeText').innerHTML = buildKaraokeHTML(text);

  wrdTotal += text.split(/\s+/).filter(Boolean).length;
  refreshCounters();

  const utt = new SpeechSynthesisUtterance(text);
  utt.rate   = 1.05;
  utt.pitch  = 1.0;
  utt.volume = 1.0;

  utt.onboundary = (e) => {
    if (e.name === 'word') highlightKaraokeWord(e.charIndex);
  };

  const done = () => {
    speaking = false;
    waveOff();
    if (activeSpeakCard) { activeSpeakCard.classList.remove('speaking'); activeSpeakCard = null; }
    if (!queue.length) showIdle();
    setTimeout(processQueue, 300);
  };
  utt.onend   = done;
  utt.onerror = done;

  window.speechSynthesis.speak(utt);
}

// Workaround: Chrome pauses synthesis after ~15s on long pages
setInterval(() => {
  if (speaking && window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
    window.speechSynthesis.pause();
    window.speechSynthesis.resume();
  }
}, 12_000);

// ── GitHub Events API ────────────────────────────────────────────────────────
async function fetchEvents() {
  if (paused) return;
  clearInterval(cdTimer);

  const token   = getToken();
  const headers = { Accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
  if (token)    headers.Authorization = `token ${token}`;
  if (lastEtag) headers['If-None-Match'] = lastEtag;

  try {
    const res = await fetch('https://api.github.com/events?per_page=30', { headers });

    const rem = res.headers.get('X-RateLimit-Remaining');
    const lim = res.headers.get('X-RateLimit-Limit');
    if (rem !== null)
      document.getElementById('rateLimit').textContent = `${rem}/${lim}`;

    pollMs  = 10_000;
    pollsec = 10;

    const etag = res.headers.get('ETag');
    if (etag) lastEtag = etag;

    if (res.status === 304) {
      setStatus('No new events');
    } else if (!res.ok) {
      setStatus(
        res.status === 403
          ? 'Rate limit reached — add a token for higher quota'
          : `GitHub returned ${res.status} — will retry`,
        true
      );
    } else {
      const events = await res.json();
      setStatus(`Live · ${new Date().toLocaleTimeString()}`);

      for (const ev of events) {
        if (seenIds.has(ev.id)) continue;
        seenIds.add(ev.id);
        const parsed = parseEvent(ev);
        if (!parsed) continue;
        evtTotal++;
        const card = addCard(parsed, ev);
        for (const t of parsed.texts) enqueue(t.speech, card);
      }
      refreshCounters();

      if (seenIds.size > 10_000)
        seenIds = new Set([...seenIds].slice(-5_000));
    }
  } catch (err) {
    if (err.name !== 'AbortError')
      setStatus(`Network error — ${err.message}`, true);
  }

  schedulePoll();
}

function schedulePoll() {
  if (paused) return;
  clearInterval(cdTimer);
  let remaining = pollsec;
  document.getElementById('nextPoll').textContent = `${remaining}s`;
  cdTimer = setInterval(() => {
    remaining = Math.max(remaining - 1, 0);
    document.getElementById('nextPoll').textContent = `${remaining}s`;
  }, 1_000);
  pollTimer = setTimeout(fetchEvents, pollMs);
}

function restart() {
  clearTimeout(pollTimer); clearInterval(cdTimer);
  lastEtag = null;
  fetchEvents();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
fetchEvents();
</script>
</body>
</html>
